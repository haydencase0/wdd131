<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Activities</title>
    <script defer src="sortfilter.js"></script>
    <link rel="stylesheet" href="sortfilter.css">
</head>
<body>
    <div id="search-bar">
        <label for="search">Enter Search</label>
        <input id="search" type="text">
        <button id="search-button">Search</button>
    </div>
    <div id="hike-container">
        <div class="hike-card">
            <div class="hike-content">
            <h2>Teton Canyon</h2>
            <div class="hike-tags">
                <button>Canyon</button>
                <button>Tetons</button>
            </div>
            <img src="https://wdd131.netlify.app/examples/hikes/images/teton-canyon.jpg" alt="Image of Teton Canyon">.
            <p>Beautiful short (or long) hike through Teton Canyon.</p>
            <p><span class="rating" role="img" aria-label="1 out of 5">🥾▫️▫️▫️▫️</span></p>
            </div>
        </div>
    </div>
  </body>
</html>
