<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Displays a character with attack and level up functionality">
    <meta property="og:url" content="https://haydencase0.github.io/wdd131/Week8/prove/charactercard.html">
    <meta property="og:image" content="https://cdna.artstation.com/p/assets/images/images/067/355/984/large/verena-geilfus-huberdnd.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Displays a character with attack and level up functionality">
    <meta name="twitter:image" content="https://cdna.artstation.com/p/assets/images/images/067/355/984/large/verena-geilfus-huberdnd.jpg">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <title>Character Card</title>
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>
    <main>
        <div id="card">
            <img id="character" src="https://cdna.artstation.com/p/assets/images/images/067/355/984/large/verena-geilfus-huberdnd.jpg" alt="Character Image">
            <div id="name">
                <p>Fagelbaum</p>
            </div>
            <div id="stats">
                <p id="class">Class: Fire Martial Artist</p>
                <p id="level">Level: 1</p>
                <p id="health">Health: 100</p>
            </div>
            <div id="buttons">
                <button type="button" id="attacked">Attacked</button>
                <button type="button" id="levelup">Level Up</button>
                <button type="button" id="reset">Revive</button>
            </div>
        </div>
    </main>
</body>
</html>
